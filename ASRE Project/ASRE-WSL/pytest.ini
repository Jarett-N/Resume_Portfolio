[pytest]
minversion = 7.0
addopts = -ra -q --disable-warnings --maxfail=1 --cov=. --cov-report=term-missing
testpaths = tests
pythonpath = .
python_files = test_*.py
python_functions = test_*
filterwarnings =
    ignore::DeprecationWarning
log_cli = true
log_cli_level = INFO
log_file = logs/test_results.log
log_file_level = INFO
